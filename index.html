<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Readersonic Shop | Premium Reading Gadgets Bangladesh</title>
    
    <!-- Custom Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Search Engine Optimization (SEO) Metadata -->
    <meta name="description" content="Readersonic Shop is Bangladesh's premier destination for premium reading gadgets, high-end e-readers, spatial audio reading frames, narrator headphones, and focus tools. Elevate your literacy experience with cash on delivery at your doorstep." />
    <meta name="keywords" content="Readersonic, Readersonic Shop, reading gadgets Bangladesh, e-readers Bangladesh, book light, spatial audiobook player, reading frames, smart reading glasses, focus tools, premium gadgets Dhaka" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Readersonic Shop" />
    <meta name="geo.region" content="BD" />
    <meta name="geo.placename" content="Bangladesh" />
    
    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Readersonic Shop | Premium Reading Gadgets for Booklovers" />
    <meta property="og:description" content="Explore and purchase premium reading hardware: active noise-masking e-readers, open-ear spatial audio frames, reading lights, and acoustic audio docks. Seamless cash on delivery all over Bangladesh." />
    <meta property="og:site_name" content="Readersonic Shop" />
    <meta property="og:url" content="https://shop.readersonic.com" />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Readersonic Shop | Premium Reading Gadgets" />
    <meta name="twitter:description" content="Elevate your reading ritual. Order high-performance reading gadgets and focus accessories with nationwide doorstep cash on delivery." />
    <meta name="twitter:image" content="/favicon.svg" />

    <!-- Structured Data (Schema.org JSON-LD) for Local Business/E-commerce -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "Readersonic Shop",
        "description": "Premium reading gadgets and literacy hardware shipped across Bangladesh.",
        "url": "https://shop.readersonic.com",
        "logo": "https://shop.readersonic.com/favicon.svg",
        "sameAs": [],
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "BD"
        },
        "offers": {
          "@type": "AggregateOffer",
          "priceCurrency": "BDT",
          "itemCondition": "https://schema.org/NewCondition"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://shop.readersonic.com/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
