<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Smooth rounded square background for both light and dark browser tabs -->
  <rect width="512" height="512" rx="128" fill="#121212" />
  
  <!-- Macron above the O -->
  <line x1="186" y1="120" x2="326" y2="120" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" />
  
  <!-- Main Circle O -->
  <circle cx="256" cy="286" r="110" fill="none" stroke="#FFFFFF" stroke-width="26" />
  
  <!-- Diagonal dial line inside O (from center pointing to 2 o'clock / upper-right) -->
  <line x1="226" y1="316" x2="286" y2="256" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" />
</svg>
